<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mood to City</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <h1>How's your week been?</h1>

    <!-- Chat Section -->
    <div id="chat-box"></div>
    <div id="input-area">
      <input id="user-input" type="text" placeholder="Tell me about your recent days..." />
      <button onclick="sendMessage()">Send</button>
    </div>

    <!-- City Result Section (hidden until ready) -->
    <div id="city-result" class="hidden">
      <button onclick="getCity()">Show me my city</button>
      <div id="city-card">
        <img id="city-image" src="" alt="" />
        <h2 id="city-name"></h2>
        <p id="city-description"></p>
        <div id="weather-info"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
