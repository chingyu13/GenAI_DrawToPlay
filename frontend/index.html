<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-visual" />
  <title>DrawToPlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sniglet&family=Huninn&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="emoji-marquee" aria-hidden="true"></div>

  <canvas id="drawing-canvas" role="img" aria-label="Drawing canvas"></canvas>
  <canvas id="blink-canvas" aria-hidden="true"></canvas>

  <svg id="hint-eyes"
       viewBox="100 305 205 90"
       xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path id="eye-left" fill="none" stroke-linecap="round" stroke-linejoin="round"
      d="M124,353.9c-8.3-5.2-3.6-28.7,5.5-28.4c11.1,0.4,21.7,18.8,10.7,30.1c-8.2,8.4-15.1,12.2-16.6,6.2
         c-1.5-5.8,7.8-20.6,21.9-17.2c6,1.4,14,5.7,14.4,11.5c0.8,12.3-16.3,22-24.2,16.8c-9.9-6.7-15.6-39.9,0.3-43
         c12-2.4,17.3,0,19.4,9.8c2.2,10.1-6.6,22.9-14.2,23.5"/>
    <path id="eye-right" fill="none" stroke-linecap="round" stroke-linejoin="round"
      d="M279,321.5c-13.1,0.1-22.1,9.6-21.8,18.4c0.3,7.2,6.8,13.1,13.2,14.9c13.3,3.8,23.5-13.1,20.8-16.2
         c-11.6-13.5-25.7-2.7-30.1,10.3c-2.4,7.1,2.2,18.5,11.1,20.9c6.5,1.7,13.8-1.8,17-6.9c6.1-9.8,0.1-25-11.9-20
         c-12.5,5.1-6.6,11.5,0.3,22.5"/>
  </svg>

  <p id="draw-hint" aria-hidden="true"></p>

  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <filter id="lg-refract" x="0" y="0" width="100%" height="100%">
      <feImage id="lg-map" href="" preserveAspectRatio="none" result="map"/>
      <feDisplacementMap in="SourceGraphic" in2="map" scale="46"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

  <div id="color-hint">
    <div id="landing-card">
      <p id="landing-tagline"></p>
      <p id="landing-tap"></p>
    </div>
  </div>

  <div id="toolbar">
    <div class="tool-btn" id="color-btn" title="Color" role="button" tabindex="0" aria-label="Choose color">
      <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22" aria-hidden="true">
        <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
      </svg>
      <input type="color" id="color-input" aria-label="Pen color" />
    </div>
    <button class="tool-btn" id="undo-btn" title="Undo" aria-label="Undo">
      <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22" aria-hidden="true">
        <path d="M12.5 8c-2.65 0-5.05 1-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/>
      </svg>
    </button>
    <button class="tool-btn" id="pen-btn" title="Pen" aria-label="Pen">
      <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22" aria-hidden="true">
        <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
      </svg>
    </button>
    <button class="tool-btn" id="eraser-btn" title="Eraser" aria-label="Eraser">
      <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22" aria-hidden="true">
        <path d="M15.14 3c-.51 0-1.02.2-1.41.59L2.59 14.73c-.78.78-.78 2.05 0 2.83L5.03 20H20v-2h-8.6l-2.06-2.06 7.07-7.07 2.83 2.83-4.24 4.24 1.42 1.41 4.24-4.24c.78-.78.78-2.05 0-2.83l-4.11-4.11c-.39-.39-.9-.59-1.41-.59z"/>
      </svg>
    </button>
  </div>

  <div id="pen-popup" class="size-popup">
    <input type="range" id="pen-slider" min="0" max="100" />
  </div>
  <div id="eraser-popup" class="size-popup">
    <input type="range" id="eraser-slider" min="0" max="100" />
  </div>

  <button id="complete-btn">Completed ✓</button>

  <div id="chat-dialog" role="dialog" aria-modal="true" aria-label="Chat">
    <button id="close-chat-btn" title="Back to drawing" aria-label="Back to drawing">✕</button>
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <button id="song-btn" title="Match my song" aria-label="Match my song">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18" aria-hidden="true">
          <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
        </svg>
      </button>
      <input id="chat-input" type="text" placeholder="Type here…" autocomplete="off" />
      <button id="send-btn" aria-label="Send message">↑</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
