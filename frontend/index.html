<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Mood Canvas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Drawing canvas (user draws here) -->
  <canvas id="drawing-canvas"></canvas>

  <!-- Eye hint SVG overlay (phase 2, animates stroke-by-stroke) -->
  <svg id="hint-eyes"
       viewBox="100 305 205 90"
       style="--eyes-width: 23.9147vw; --eyes-stroke-width: 15.82;"
       xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path id="eye-left" fill="none" stroke-linecap="round" stroke-linejoin="round"
      stroke-width="var(--eyes-stroke-width)"
      d="M124,353.9c-8.3-5.2-3.6-28.7,5.5-28.4c11.1,0.4,21.7,18.8,10.7,30.1c-8.2,8.4-15.1,12.2-16.6,6.2
         c-1.5-5.8,7.8-20.6,21.9-17.2c6,1.4,14,5.7,14.4,11.5c0.8,12.3-16.3,22-24.2,16.8c-9.9-6.7-15.6-39.9,0.3-43
         c12-2.4,17.3,0,19.4,9.8c2.2,10.1-6.6,22.9-14.2,23.5"/>
    <path id="eye-right" fill="none" stroke-linecap="round" stroke-linejoin="round"
      stroke-width="var(--eyes-stroke-width)"
      d="M279,321.5c-13.1,0.1-22.1,9.6-21.8,18.4c0.3,7.2,6.8,13.1,13.2,14.9c13.3,3.8,23.5-13.1,20.8-16.2
         c-11.6-13.5-25.7-2.7-30.1,10.3c-2.4,7.1,2.2,18.5,11.1,20.9c6.5,1.7,13.8-1.8,17-6.9c6.1-9.8,0.1-25-11.9-20
         c-12.5,5.1-6.6,11.5,0.3,22.5"/>
  </svg>

  <!-- Phase 1: tap to confirm color -->
  <div id="color-hint">
    <p>Tap to lock in your color</p>
  </div>

  <!-- Color wheel picker (phase 2+, bottom-right) -->
  <div id="color-picker-wrap">
    <svg id="color-wheel" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 22 A28 28 0 0 1 64 25.75 L74 8.43 A48 48 0 0 0 50 2 Z" fill="#f5e020"/>
      <path d="M64 25.75 A28 28 0 0 1 74.25 36 L91.57 26 A48 48 0 0 0 74 8.43 Z" fill="#9bc73b"/>
      <path d="M74.25 36 A28 28 0 0 1 78 50 L98 50 A48 48 0 0 0 91.57 26 Z" fill="#3aab50"/>
      <path d="M78 50 A28 28 0 0 1 74.25 64 L91.57 74 A48 48 0 0 0 98 50 Z" fill="#36a07a"/>
      <path d="M74.25 64 A28 28 0 0 1 64 74.25 L74 91.57 A48 48 0 0 0 91.57 74 Z" fill="#3a87c0"/>
      <path d="M64 74.25 A28 28 0 0 1 50 78 L50 98 A48 48 0 0 0 74 91.57 Z" fill="#3355a8"/>
      <path d="M50 78 A28 28 0 0 1 36 74.25 L26 91.57 A48 48 0 0 0 50 98 Z" fill="#5c44b8"/>
      <path d="M36 74.25 A28 28 0 0 1 25.75 64 L8.43 74 A48 48 0 0 0 26 91.57 Z" fill="#8b2faa"/>
      <path d="M25.75 64 A28 28 0 0 1 22 50 L2 50 A48 48 0 0 0 8.43 74 Z" fill="#c4328a"/>
      <path d="M22 50 A28 28 0 0 1 25.75 36 L8.43 26 A48 48 0 0 0 2 50 Z" fill="#d63a50"/>
      <path d="M25.75 36 A28 28 0 0 1 36 25.75 L26 8.43 A48 48 0 0 0 8.43 26 Z" fill="#d43a28"/>
      <path d="M36 25.75 A28 28 0 0 1 50 22 L50 2 A48 48 0 0 0 26 8.43 Z" fill="#e8842a"/>
    </svg>
    <input type="color" id="color-input" />
  </div>

  <!-- Completed button (appears after 3s idle, only after drawing starts) -->
  <button id="complete-btn">Completed ✓</button>

  <!-- Phase 3: chat overlay -->
  <div id="chat-overlay">
    <div id="drawing-preview">
      <img id="preview-img" alt="your drawing" />
      <button id="back-btn" title="Back to drawing">✕</button>
    </div>
    <div id="chat-panel">
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Type here..." autocomplete="off" />
        <button id="send-btn">→</button>
      </div>
    </div>
  </div>

  <!-- City reveal card (shown after chat, replaces dialog) -->
  <div id="city-reveal">
    <div id="city-reveal-card">
      <img id="city-reveal-img" alt="" />
      <div id="city-reveal-body">
        <p id="city-reveal-reason"></p>
        <h2 id="city-reveal-name"></h2>
        <p id="city-reveal-weather"></p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
